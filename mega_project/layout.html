<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Chat History</h2>
            <ul>
                <li>📌 Interview with Arham Ali (Gaming)</li>
                <li>📞 Call with Annie (Description)</li>
                <li>🎤 TEDx Description</li>
            </ul>
        </aside>

        <!-- Chat Section -->
        <main class="chat-section">
            <!-- Header -->
            <header class="chat-header">
                <img src=https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSDtSKLACtSSTiirLuLzMdxoZtHotDHSClvyw&s alt="ChatGPT Logo" class="logo">
                <span class="chat-title">ChatGPT</span>
                <span class="username">Muhammad Umer</span>
                <img src=https://scontent.flhe3-2.fna.fbcdn.net/v/t39.30808-1/473186018_122123713508585866_7077107625980454169_n.jpg?stp=c52.0.788.788a_dst-jpg_s200x200_tt6&_nc_cat=102&ccb=1-7&_nc_sid=e99d92&_nc_eui2=AeFm1-2ASjC6U6qkysn1IUGa8AM_KgDlb2TwAz8qAOVvZPvN9DPQneIVwV7N3wrwohb7_lKy5qoECxK80PUK2zAy&_nc_ohc=vircuOvy420Q7kNvgGZBr6K&_nc_oc=AdgUeHrOQ0aYKIGRVFf37Uzx455FzaNqS-SIG0yo38x4v-ZGF58R-FmrbSeY1oNpPMM&_nc_zt=24&_nc_ht=scontent.flhe3-2.fna&_nc_gid=An8AWgqmHjAEopuCDshg_gZ&oh=00_AYClvTUqJ4Qtet0dQmnr7yJiYlg_WJJHwPwSPhDdjORSKg&oe=67B64E6F alt="Profile" class="profile-pic">
            </header>

            <!-- Chat Window -->
            <div class="chat-window" id="chat-window"></div>

            <!-- Input Area -->
            <div class="input-area">
                <button id="image-upload">➕</button>
                <input type="text" id="message" placeholder="Send a message..." autocomplete="off">
                <button id="search-reason">🔍 Search Reason</button>
                <button id="send">➤</button>
            </div>
        </main>
    </div>

    <script src="backend.js"></script>
</body>
</html>
